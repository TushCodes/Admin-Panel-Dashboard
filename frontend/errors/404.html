<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Panel Dashboard Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { 500: '#2563eb', 600: '#1d4ed8' } },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 text-white antialiased">
    <div id="app" class="mx-auto flex min-h-screen w-full max-w-5xl items-center px-4 py-10 sm:px-6 lg:px-8">
      <main class="w-full overflow-hidden rounded-[2rem] border border-white/10 bg-white shadow-2xl shadow-black/30">
        <section class="grid lg:grid-cols-[0.9fr_1.1fr]">
          <div class="flex min-h-80 flex-col justify-between bg-gradient-to-br p-8 text-white sm:p-10" :class="page.accent">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.35em] text-white/70">{{ page.eyebrow }}</p>
              <p class="mt-8 text-8xl font-black leading-none tracking-tighter sm:text-9xl">{{ page.code }}</p>
            </div>
            <p class="mt-8 max-w-sm text-lg font-bold leading-8 text-white/85">Admin Panel Dashboard error page</p>
          </div>

          <div class="bg-white p-8 text-slate-900 sm:p-10">
            <p class="text-xs font-black uppercase tracking-[0.25em] text-brand-600">Error state</p>
            <h1 class="mt-3 text-4xl font-black tracking-tight sm:text-5xl">{{ page.title }}</h1>
            <p class="mt-4 text-lg leading-8 text-slate-600">{{ page.description }}</p>

            <div class="mt-8 flex flex-col gap-3 sm:flex-row">
              <a href="/" class="inline-flex items-center justify-center rounded-2xl bg-brand-600 px-5 py-3 font-black text-white shadow-lg shadow-blue-600/20 transition hover:bg-brand-500 focus:outline-none focus:ring-4 focus:ring-blue-200">{{ page.action }}</a>
              <button type="button" onclick="window.history.back()" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 px-5 py-3 font-black text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-200">Go back</button>
            </div>

            <div class="mt-8 rounded-3xl border border-slate-200 bg-slate-50 p-5">
              <h2 class="font-black">What you can try</h2>
              <ul class="mt-3 grid gap-2 text-sm leading-6 text-slate-600">
                <li v-for="item in page.guidance" :key="item" class="flex gap-2"><span class="font-black text-brand-600">•</span><span>{{ item }}</span></li>
              </ul>
            </div>

            <nav class="mt-8" aria-label="Other error pages">
              <p class="text-sm font-black text-slate-500">Preview other error pages</p>
              <div class="mt-3 flex flex-wrap gap-2">
                <a v-for="errorPage in relatedPages" :key="errorPage.code" :href="errorPage.href" class="rounded-full border border-slate-200 px-3 py-1 text-sm font-bold text-slate-700 transition hover:border-brand-500 hover:text-brand-600">{{ errorPage.code }}</a>
              </div>
            </nav>
          </div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module" src="./error-page.js"></script>
  </body>
</html>
